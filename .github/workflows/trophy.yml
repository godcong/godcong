name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * 0"   # 每周日 UTC 00:00 更新
  workflow_dispatch:        # 也可手动触发

jobs:
  generate-trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate trophy SVG
        run: |
          deno run --allow-net --allow-env --allow-read --allow-write \
            https://raw.githubusercontent.com/ryo-ma/github-profile-trophy/master/render_svg.ts \
            godcong ./images/trophy.svg flat

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ./images/trophy.svg
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: auto-upgrade trophy"
          git push
